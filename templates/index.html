<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Page</title>
  </head>
  <body>
    <div class="container mt-5">
      <form action="/upload" method="post" enctype="multipart/form-data">
        <div class="input-group">
          <input type="file" name="file" class="form-control" id="file" />
          <button class="btn btn-outline-success" type="submit" id="upload-btn">
            Upload
          </button>
        </div>
      </form>

    </div>
    <div class="container my-3">


        <table class="table">
            {% if all_files | length == 0 %}
            <div class="alert alert-danger my-3" role="alert">
              No Record Found!
            </div>
            {% else %}
            <thead>
              <tr>
                <th scope="col">SNo</th>
                <th scope="col">Document uploaded</th>
                <th scope="col">Time Uploaded</th>
                <th scope="col">Actions</th>
              </tr>
            </thead>
            <tbody>
            {% for file in all_files %}
      <tr>
        <th scope="row">{{loop.index}}</th>
        <td>{{file.filename}}</td>
        <td>{{file.uploaded_time}}</td>
        <td>
          <a href="/delete/{{file.id}}" type="button" class="btn btn-outline-danger btn-sm mx-1"><i class="fa-solid fa-trash"></i>
          <a href="/update/{{file.id}}" type="button" class="btn btn-outline-success btn-sm mx-1"><i class="fa-solid fa-pen"></i>
          </a>
        </td>
      </tr>
      {%endfor %}
    </tbody>
    </table>
  
            {% endif %}    
    </div>
    
</div>
  </body>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"
  ></script>
</html>
