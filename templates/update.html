<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Upload</title>
  </head>
  <body>
    <div class="container my-5">
      <h1>Update your file</h1>
      <form action="/update/{{ final_updated.id }}" method="post" enctype="multipart/form-data">
        <div class="input-group">
          <input type="file" name="file" class="form-control" id="file" value="{{ final_updated.filename }}"/>
          <button class="btn btn-outline-success" type="submit" id="upload-btn">
            Update
          </button>
        </div>
      </form>
      <div>
        <p>Current file: {{ final_updated.filename }}</p>
      </div>
    </div>
  </body>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"
  ></script>
</html>
